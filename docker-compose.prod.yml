services:
  frontend:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8000
      NEXTAUTH_URL: https://truerisk.cloud
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-truerisk}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-truerisk}
      JWT_SECRET: ${JWT_SECRET}
      AEMET_API_KEY: ${AEMET_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      FIRMS_MAP_KEY: ${FIRMS_MAP_KEY:-}
      OPENAQ_API_KEY: ${OPENAQ_API_KEY:-}
      CDSAPI_KEY: ${CDSAPI_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_MESSAGING_SERVICE_SID: ${TWILIO_MESSAGING_SERVICE_SID:-}
      TWILIO_FROM_PHONE: ${TWILIO_FROM_PHONE:-}
      BACKEND_CORS_ORIGINS: '["https://truerisk.cloud"]'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-truerisk}
      POSTGRES_USER: ${POSTGRES_USER:-truerisk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-truerisk} -d ${POSTGRES_DB:-truerisk}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
