services:
  frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
      NEXTAUTH_URL: https://truerisk.cloud
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_ID: ${GITHUB_ID}
      GITHUB_SECRET: ${GITHUB_SECRET}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-truerisk}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-truerisk}
      JWT_SECRET: ${JWT_SECRET}
      AEMET_API_KEY: ${AEMET_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      FIRMS_MAP_KEY: ${FIRMS_MAP_KEY:-}
      OPENAQ_API_KEY: ${OPENAQ_API_KEY:-}
      CDSAPI_KEY: ${CDSAPI_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_MESSAGING_SERVICE_SID: ${TWILIO_MESSAGING_SERVICE_SID:-}
      TWILIO_FROM_PHONE: ${TWILIO_FROM_PHONE:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-https://truerisk.cloud/api/v1/telegram/webhook}
      SENTRY_DSN: ${SENTRY_DSN:-}
      BACKEND_CORS_ORIGINS: '["https://truerisk.cloud"]'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-truerisk}
      POSTGRES_USER: ${POSTGRES_USER:-truerisk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-truerisk} -d ${POSTGRES_DB:-truerisk}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  backup:
    image: postgres:16-alpine
    restart: "no"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-truerisk}
      POSTGRES_USER: ${POSTGRES_USER:-truerisk}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: db
    volumes:
      - ./backend/scripts/backup.sh:/backup.sh:ro
      - backups:/backups
    entrypoint: ["/bin/sh", "-c", "chmod +x /backup.sh && /backup.sh"]
    depends_on:
      db:
        condition: service_healthy
    profiles: ["backup"]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

volumes:
  pgdata:
  backups:
