services:
  frontend:
    build: .
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://truerisk:truerisk@db:5432/truerisk
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      AEMET_API_KEY: ${AEMET_API_KEY:-}
      BACKEND_CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: truerisk
      POSTGRES_USER: truerisk
      POSTGRES_PASSWORD: truerisk
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

volumes:
  pgdata:
