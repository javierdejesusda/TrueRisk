<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#84CC16"/>
      <stop offset="40%" stop-color="#FBBF24"/>
      <stop offset="70%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
  </defs>
  <!-- Background: rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- T letterform — bold, geometric -->
  <rect x="96" y="100" width="320" height="52" rx="6" fill="#f1f5f9"/>
  <rect x="216" y="100" width="80" height="296" rx="6" fill="#f1f5f9"/>
  <!-- Risk bar — severity gradient at bottom -->
  <rect x="96" y="428" width="320" height="16" rx="8" fill="url(#bar)"/>
</svg>
