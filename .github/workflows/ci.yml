name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Build
        run: npm run build
        env:
          BACKEND_URL: "http://localhost:8000"
          NEXT_PUBLIC_SENTRY_DSN: ""
          SENTRY_ORG: ""
          SENTRY_PROJECT: ""

  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: truerisk_test
          POSTGRES_USER: truerisk
          POSTGRES_PASSWORD: truerisk
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install CPU-only PyTorch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -e ".[dev,ml-extras]"

      - name: Lint (ruff)
        run: ruff check app/

      - name: Type check (mypy)
        run: mypy app/ --ignore-missing-imports

      - name: Run migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://truerisk:truerisk@localhost:5432/truerisk_test
          JWT_SECRET: ci-test-secret
          FIELD_ENCRYPTION_KEY: NM73lE7_QLv-PMRqOgPffUUzqH8ljkBKJQe7PtJA874=

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          JWT_SECRET: ci-test-secret
          FIELD_ENCRYPTION_KEY: NM73lE7_QLv-PMRqOgPffUUzqH8ljkBKJQe7PtJA874=

  deploy:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Dokploy deployment
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
        run: |
          HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" \
            -X POST "${DOKPLOY_URL}/api/compose.deploy" \
            -H "x-api-key: ${DOKPLOY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"composeId\": \"${DOKPLOY_COMPOSE_ID}\"}")

          cat response.json
          echo ""

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Dokploy deploy trigger failed (HTTP $HTTP_CODE)"
            exit 1
          fi

          echo "Deployment triggered successfully"

      - name: Verify deployment health
        env:
          HEALTH_URL: ${{ secrets.PRODUCTION_HEALTH_URL }}
        run: |
          echo "Polling for healthy deployment..."
          sleep 30

          for i in $(seq 1 60); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "${HEALTH_URL}" --max-time 10) || true

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Deployment healthy after ~$((30 + i * 10))s!"
              exit 0
            fi

            echo "Attempt $i/60: HTTP $HTTP_CODE, retrying in 10s..."
            sleep 10
          done

          echo "::error::Deployment health check failed after 10 minutes"
          exit 1
